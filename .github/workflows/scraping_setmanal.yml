name: Scraping Setmanal FCF

on:
  schedule:
    # Cada dilluns a les 08:00 UTC (10:00 hora catalana)
    - cron: "0 8 * * 1"
  workflow_dispatch:  # també permet executar manualment des de GitHub

jobs:
  scraping:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositori
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instal·lar dependències
        run: pip install -r requirements.txt

      - name: Executar scraper
        run: python scraper.py --output dades

      - name: Pujar CSVs com a artefacte (backup)
        uses: actions/upload-artifact@v4
        with:
          name: dades-${{ github.run_number }}
          path: dades/consolidat_*.csv
          retention-days: 30
