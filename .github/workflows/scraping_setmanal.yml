name: Scraping Setmanal FCF

on:
  schedule:
    # Cada dilluns a les 06:00 UTC (08:00 hora catalana)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      categoria:
        description: "Categoria concreta (buida = totes en paral·lel)"
        required: false
        default: ""
      grup:
        description: "Grup concret (buida = tots)"
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================
  # JOB A: Tercera Catalana (18 grups) — el més llarg
  # ============================================================
  tercera:
    name: "Tercera Catalana"
    runs-on: ubuntu-latest
    timeout-minutes: 340
    if: github.event.inputs.categoria == '' || github.event.inputs.categoria == 'TERCERA'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Scraping Tercera Catalana
        run: |
          if [ -n "${{ github.event.inputs.grup }}" ]; then
            python scraper.py --categoria TERCERA --grup ${{ github.event.inputs.grup }}
          else
            python scraper.py --categoria TERCERA
          fi

      - name: Pujar artefacte Tercera
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dades-tercera-${{ github.run_number }}
          path: dades/TERCERA/
          retention-days: 90
          if-no-files-found: warn

  # ============================================================
  # JOB B: Segona Catalana (6 grups)
  # ============================================================
  segona:
    name: "Segona Catalana"
    runs-on: ubuntu-latest
    timeout-minutes: 200
    if: github.event.inputs.categoria == '' || github.event.inputs.categoria == 'SEGONA'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Scraping Segona Catalana
        run: |
          if [ -n "${{ github.event.inputs.grup }}" ]; then
            python scraper.py --categoria SEGONA --grup ${{ github.event.inputs.grup }}
          else
            python scraper.py --categoria SEGONA
          fi

      - name: Pujar artefacte Segona
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dades-segona-${{ github.run_number }}
          path: dades/SEGONA/
          retention-days: 90
          if-no-files-found: warn

  # ============================================================
  # JOB C: Primera Catalana (3 grups)
  # ============================================================
  primera:
    name: "Primera Catalana"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    if: github.event.inputs.categoria == '' || github.event.inputs.categoria == 'PRIMERA'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Scraping Primera Catalana
        run: |
          if [ -n "${{ github.event.inputs.grup }}" ]; then
            python scraper.py --categoria PRIMERA --grup ${{ github.event.inputs.grup }}
          else
            python scraper.py --categoria PRIMERA
          fi

      - name: Pujar artefacte Primera
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dades-primera-${{ github.run_number }}
          path: dades/PRIMERA/
          retention-days: 90
          if-no-files-found: warn

  # ============================================================
  # JOB D: Consolidació — s'executa quan els 3 jobs anteriors acaben
  # ============================================================
  consolidar:
    name: "Consolidació final"
    runs-on: ubuntu-latest
    needs: [tercera, segona, primera]
    if: always()  # executa fins i tot si algun job ha fallat parcialment

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt

      - name: Descarregar artefacte Tercera
        uses: actions/download-artifact@v4
        with:
          name: dades-tercera-${{ github.run_number }}
          path: dades/TERCERA/
        continue-on-error: true

      - name: Descarregar artefacte Segona
        uses: actions/download-artifact@v4
        with:
          name: dades-segona-${{ github.run_number }}
          path: dades/SEGONA/
        continue-on-error: true

      - name: Descarregar artefacte Primera
        uses: actions/download-artifact@v4
        with:
          name: dades-primera-${{ github.run_number }}
          path: dades/PRIMERA/
        continue-on-error: true

      - name: Consolidar tots els grups
        run: python scraper.py --only-consolidar

      - name: Pujar CSVs consolidats finals
        uses: actions/upload-artifact@v4
        with:
          name: dades-consolidades-${{ github.run_number }}
          path: dades/consolidat_*.csv
          retention-days: 90
          if-no-files-found: warn

      - name: Resum al dashboard de GitHub
        if: always()
        run: |
          echo "## 📊 Resum del Scraping" >> $GITHUB_STEP_SUMMARY
          echo "| Fitxer | Registres |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-----------|" >> $GITHUB_STEP_SUMMARY
          find dades/ -name "consolidat_*.csv" | sort | while read f; do
            nom=$(basename "$f")
            lines=$(($(wc -l < "$f") - 1))
            echo "| \`$nom\` | $lines |" >> $GITHUB_STEP_SUMMARY
          done
